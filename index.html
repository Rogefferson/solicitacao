<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Criativos - Igreja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        igreja: { blue: '#0047AB', black: '#111111', gray: '#F3F4F6' }
                    }
                }
            }
        }
    </script>
    <style>
        /* 1. ESCONDER SCROLLBARS MANTENDO A FUNCIONALIDADE */
        .hide-scrollbar {
            -ms-overflow-style: none;
            /* IE/Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari */
        }

        /* 2. ESTILO DAS COLUNAS - ESSENCIAL PARA O SCROLL VERTICAL */
        .kanban-column {
            min-height: 200px;
            max-height: 70vh;
            /* Limita a altura para o scroll interno funcionar */
            overflow-y: auto;
            /* Permite scroll vertical */
            overflow-x: hidden;
            transition: background-color 0.2s;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
            scroll-behavior: smooth;
        }

        /* Container Principal - Ajuste para o Scroll Lateral */
        #kanban-container {
            display: flex;
            overflow-x: auto;
            /* Permite scroll horizontal */
            overflow-y: hidden;
            cursor: grab;
            gap: 1.5rem;
            padding-bottom: 2rem;
            min-height: calc(100vh - 150px);
            width: 100%;
        }

        #kanban-container:active,
        .kanban-column:active {
            cursor: grabbing;
        }

        .card-placeholder {
            background: rgba(0, 71, 171, 0.05);
            border: 2px dashed #0047AB;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .kanban-card {
            user-select: none;
            pointer-events: auto;
        }

        /* Área do título da coluna */
        .header-col {
            pointer-events: none;
        }

        .header-col * {
            pointer-events: auto;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans antialiased text-igreja-black">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-igreja-blue rounded-xl flex items-center justify-center text-white">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h1 class="text-xl font-black text-igreja-blue tracking-tight">MÍDIA HUB</h1>
            </div>
            <button onclick="abrirModal()"
                class="bg-igreja-blue text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-800 transition-all shadow-lg active:scale-95">
                <i class="fa-solid fa-plus mr-2"></i>Nova Solicitação
            </button>
        </div>
    </nav>

    <main class="p-6">
        <div id="kanban-container" class="hide-scrollbar items-start">
        </div>
    </main>

    <div id="modalForm"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="fecharModal()"
                class="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl transition-colors">&times;</button>
            <form id="mediaForm" class="space-y-5" onsubmit="salvarNoSupabase(event)">
                <h2 class="text-2xl font-black mb-6">Criar Novo Cartão</h2>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Departamento</label>
                    <input type="text" id="departamento" required
                        class="w-full rounded-xl border-gray-100 bg-gray-50 p-3 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Data</label>
                        <input type="date" id="dataInicio" required
                            class="w-full rounded-xl bg-gray-50 p-3 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Horário</label>
                        <input type="time" id="horario" required class="w-full rounded-xl bg-gray-50 p-3 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1 ml-1">Tema</label>
                    <input type="text" id="tema" required class="w-full rounded-xl bg-gray-50 p-3 outline-none">
                </div>
                <button type="submit"
                    class="w-full bg-igreja-blue text-white font-bold py-4 rounded-2xl hover:bg-blue-800 transition-all">Criar
                    Cartão</button>
            </form>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fuilsqakfhzgadshopan.supabase.co', 'sb_publishable_bhUX3iCEPheSGRs0rcYcDg_u7YEJAfC');

        const colunas = [
            { id: 'solicitacoes', nome: '📥 Solicitações' },
            { id: 'analise', nome: '🔎 Alinhamento' },
            { id: 'producao', nome: '🎨 Produção' },
            { id: 'revisao', nome: '👀 Revisão' },
            { id: 'pronto', nome: '✅ Pronto' },
            { id: 'programado', nome: '📢 Programado' },
            { id: 'arquivado', nome: '🗂️ Arquivado' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderizarColunas();
            carregarCards();
            ativarRealtime();

            // Scroll lateral do container principal
            const mainContainer = document.getElementById('kanban-container');
            makeDraggableScroll(mainContainer, 'x');
        });

        // --- FUNÇÃO DE DRAG SCROLL CORRIGIDA ---
        function makeDraggableScroll(element, axis = 'both') {
            let isDown = false;
            let startX, startY, scrollLeft, scrollTop;

            element.addEventListener('mousedown', (e) => {
                // Não inicia o drag se clicar em cards ou botões para não atrapalhar o SortableJS ou cliques
                if (e.target.closest('.kanban-card') || e.target.closest('button') || e.target.closest('input')) return;

                isDown = true;
                element.classList.add('active'); // CSS opcional para feedback

                startX = e.pageX - element.offsetLeft;
                startY = e.pageY - element.offsetTop;
                scrollLeft = element.scrollLeft;
                scrollTop = element.scrollTop;
            });

            element.addEventListener('mouseleave', () => { isDown = false; });
            element.addEventListener('mouseup', () => { isDown = false; });

            element.addEventListener('mousemove', (e) => {
                if (!isDown) return;

                // e.preventDefault() aqui evita que o navegador selecione texto enquanto você arrasta
                e.preventDefault();

                if (axis === 'x' || axis === 'both') {
                    const x = e.pageX - element.offsetLeft;
                    const walkX = (x - startX) * 2; // Velocidade do scroll
                    element.scrollLeft = scrollLeft - walkX;
                }

                if (axis === 'y' || axis === 'both') {
                    const y = e.pageY - element.offsetTop;
                    const walkY = (y - startY) * 2;
                    element.scrollTop = scrollTop - walkY;
                }
            });
        }

        function renderizarColunas() {
            const container = document.getElementById('kanban-container');
            container.innerHTML = '';

            colunas.forEach(col => {
                const colDiv = document.createElement('div');
                colDiv.className = "flex-shrink-0 w-80 flex flex-col h-full";
                colDiv.innerHTML = `
                    <div class="flex items-center justify-between mb-4 px-1 header-col">
                        <h3 class="font-black text-gray-400 uppercase text-[11px] tracking-widest">${col.nome}</h3>
                        <span id="badge-${col.id}" class="bg-gray-200 text-gray-500 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="col-${col.id}" data-status="${col.id}" 
                         class="kanban-column hide-scrollbar pb-10"></div>
                `;
                container.appendChild(colDiv);

                const colElement = document.getElementById(`col-${col.id}`);

                // Ativa a mãozinha vertical apenas na coluna interna
                makeDraggableScroll(colElement, 'y');

                new Sortable(colElement, {
                    group: 'kanban',
                    animation: 200,
                    ghostClass: 'card-placeholder',
                    onEnd: async (evt) => {
                        const cardId = evt.item.dataset.id;
                        const novoStatus = evt.to.dataset.status;
                        await atualizarStatusCard(cardId, novoStatus);
                    }
                });
            });
        }

        // Funções de dados permanecem iguais...
        async function carregarCards() {
            const { data: cards, error } = await _supabase.from('cards').select('*').order('created_at', { ascending: false });
            if (error) return;
            document.querySelectorAll('.kanban-column').forEach(el => el.innerHTML = '');
            cards.forEach(card => {
                const cardEl = criarElementoCard(card);
                const coluna = document.getElementById(`col-${card.status}`);
                if (coluna) coluna.appendChild(cardEl);
            });
            atualizarContadores();
        }

        function criarElementoCard(card) {
            const div = document.createElement('div');
            div.className = 'kanban-card bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4 cursor-grab active:cursor-grabbing hover:shadow-md transition-all group relative';
            div.dataset.id = card.id;
            const dataFmt = card.data_inicio ? new Date(card.data_inicio + 'T00:00:00').toLocaleDateString('pt-BR') : '--/--/--';
            const materiaisHtml = (card.materiais || []).map(m => `<span class="bg-blue-50 text-blue-600 text-[9px] px-2 py-0.5 rounded-md font-bold uppercase tracking-tighter">${m}</span>`).join(' ');

            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[9px] font-black text-white bg-igreja-blue px-2 py-0.5 rounded-full uppercase">${card.departamento || 'Geral'}</span>
                    <button onclick="removerCard('${card.id}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
                <h4 class="font-bold text-sm text-gray-800 leading-tight mb-2">${card.tema}</h4>
                <div class="flex items-center gap-3 text-[10px] text-gray-400 mb-4">
                    <span><i class="fa-regular fa-calendar mr-1"></i> ${dataFmt}</span>
                    <span><i class="fa-regular fa-clock mr-1"></i> ${card.horario ? card.horario.substring(0, 5) : '--:--'}</span>
                </div>
                <div class="flex flex-wrap gap-1.5">${materiaisHtml}</div>
            `;
            return div;
        }

        async function salvarNoSupabase(e) {
            e.preventDefault();
            const { error } = await _supabase.from('cards').insert([{
                departamento: document.getElementById('departamento').value,
                data_inicio: document.getElementById('dataInicio').value,
                horario: document.getElementById('horario').value,
                tema: document.getElementById('tema').value,
                status: 'solicitacoes'
            }]);
            if (!error) { fecharModal(); document.getElementById('mediaForm').reset(); carregarCards(); }
        }

        async function atualizarStatusCard(id, novoStatus) {
            await _supabase.from('cards').update({ status: novoStatus }).eq('id', id);
            atualizarContadores();
        }

        async function removerCard(id) {
            if (confirm("Apagar cartão?")) {
                await _supabase.from('cards').delete().eq('id', id);
                carregarCards();
            }
        }

        function atualizarContadores() {
            colunas.forEach(col => {
                const el = document.getElementById(`col-${col.id}`);
                if (el) {
                    const badge = document.getElementById(`badge-${col.id}`);
                    if (badge) badge.textContent = el.children.length;
                }
            });
        }

        function ativarRealtime() {
            _supabase.channel('schema-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'cards' }, () => carregarCards()).subscribe();
        }

        function abrirModal() { document.getElementById('modalForm').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modalForm').classList.add('hidden'); }
    </script>
</body>

</html>

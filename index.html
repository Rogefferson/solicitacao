<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Central de Mídias</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --bg: #0b1622;
      --surface: #111f30;
      --surface2: #172840;
      --card-bg: #152238;
      --card-hover: #1a2d4a;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --gold: #f4a435;
      --gold-light: #fbc46a;
      --text: #dce8f5;
      --text-muted: #6e8aa8;
      --text-dim: #3d5570;
      --green: #34d399;
      --blue: #60a5fa;
      --purple: #a78bfa;
      --pink: #f472b6;
      --red: #f87171;
      --orange: #fb923c;
      --teal: #2dd4bf;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      --radius: 12px;
      --radius-sm: 8px;
      --header-h: 58px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(244, 164, 53, .35);
    }

    .logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      letter-spacing: .03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logo h1 span {
      color: var(--gold);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .stats-badge {
      font-size: .72rem;
      font-weight: 700;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    /* ─── BUTTONS ─────────────────────────────── */
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #1a0e00;
      border: none;
      padding: 9px 18px;
      border-radius: 9px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: .875rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all .2s;
      box-shadow: 0 3px 14px rgba(244, 164, 53, .3);
      letter-spacing: .01em;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 5px 20px rgba(244, 164, 53, .45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 9px 16px;
      border-radius: 9px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .875rem;
      cursor: pointer;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:hover {
      color: var(--text);
      border-color: var(--border2);
    }

    .btn-danger {
      background: rgba(248, 113, 113, .1);
      color: var(--red);
      border: 1px solid rgba(248, 113, 113, .2);
      padding: 9px 16px;
      border-radius: 9px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .875rem;
      cursor: pointer;
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-danger:hover {
      background: rgba(248, 113, 113, .2);
    }

    /* ─── FLOATING ACTION BUTTON (mobile) ─────── */
    .fab {
      display: none;
      position: fixed;
      bottom: 22px;
      right: 18px;
      z-index: 500;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #1a0e00;
      border: none;
      font-size: 1.6rem;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(244, 164, 53, .5);
      align-items: center;
      justify-content: center;
      transition: transform .2s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
    }

    .fab:active {
      transform: scale(.92);
    }

    /* ─── BOARD ──────────────────────────────── */
    .board {
      display: flex;
      gap: 12px;
      padding: 14px 16px 14px;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      align-items: flex-start;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scroll-padding: 16px;
    }

    .board::-webkit-scrollbar {
      height: 4px;
    }

    .board::-webkit-scrollbar-track {
      background: transparent;
    }

    .board::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 3px;
    }

    /* ─── COLUMN ─────────────────────────────── */
    .column {
      flex-shrink: 0;
      width: 268px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: calc(100vh - var(--header-h) - 28px);
      scroll-snap-align: start;
    }

    .col-header {
      padding: 10px 13px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .col-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: .75rem;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn-pdf {
      background: rgba(244, 164, 53, .12);
      border: 1px solid rgba(244, 164, 53, .3);
      color: var(--gold);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: .68rem;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      letter-spacing: .03em;
      transition: background .15s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn-pdf:hover { background: rgba(244, 164, 53, .22); }
    .btn-pdf:disabled { opacity: .45; cursor: not-allowed; }

    .col-count {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: .72rem;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .cards-wrap {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 3px 2px 6px;
      min-height: 64px;
      -webkit-overflow-scrolling: touch;
    }

    .cards-wrap::-webkit-scrollbar {
      width: 3px;
    }

    .cards-wrap::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 2px;
    }

    /* ─── CARD ───────────────────────────────── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent, var(--gold));
      border-radius: var(--radius-sm);
      padding: 13px 13px 11px;
      cursor: pointer;
      transition: background .18s, transform .18s, box-shadow .18s;
      position: relative;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }

    .card:hover {
      background: var(--card-hover);
      border-color: var(--border2);
      border-left-color: var(--accent, var(--gold));
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card.sortable-ghost {
      opacity: .25;
    }

    .card.sortable-chosen {
      box-shadow: 0 10px 36px rgba(0, 0, 0, .55);
      transform: scale(1.02) rotate(.5deg);
    }

    .card-tema {
      font-weight: 800;
      font-size: .88rem;
      margin-bottom: 5px;
      color: var(--text);
      line-height: 1.3;
    }

    .card-meta {
      font-size: .73rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 9px;
      padding-top: 9px;
      border-top: 1px solid var(--border);
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1;
    }

    .tag {
      font-size: .62rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: .03em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* On mobile, delete button always visible (no hover state) */
    .card-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s;
      flex-shrink: 0;
      margin-left: 6px;
    }

    .card:hover .card-actions {
      opacity: 1;
    }

    .card-btn {
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .card-btn:hover {
      background: var(--red);
      color: #fff;
    }

    .empty-col {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 18px;
      text-align: center;
      color: var(--text-dim);
      font-size: .78rem;
      user-select: none;
      pointer-events: none;
    }

    /* ─── MODAL ──────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      max-height: 92vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      transform: translateY(24px) scale(.97);
      transition: transform .25s;
      box-shadow: 0 28px 80px rgba(0, 0, 0, .7);
    }

    .modal::-webkit-scrollbar {
      width: 4px;
    }

    .modal::-webkit-scrollbar-thumb {
      background: var(--surface2);
      border-radius: 2px;
    }

    .overlay.active .modal {
      transform: none;
    }

    .modal-head {
      padding: 16px 18px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 10;
      border-radius: 16px 16px 0 0;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .modal-title span {
      color: var(--gold);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-x {
      background: var(--surface2);
      border: none;
      color: var(--text-muted);
      width: 34px;
      height: 34px;
      flex-shrink: 0;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .modal-x:hover {
      background: var(--red);
      color: #fff;
    }

    .modal-body {
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-foot {
      padding: 12px 18px 16px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }

    /* ─── FORM ───────────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    label {
      font-size: .74rem;
      font-weight: 800;
      color: var(--text-muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    label .req {
      color: var(--gold);
      margin-left: 2px;
    }

    input[type=text],
    input[type=date],
    input[type=time],
    select,
    textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      /* 16px evita zoom no iOS */
      padding: 11px 12px;
      width: 100%;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
      -webkit-appearance: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(244, 164, 53, .12);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--text-dim);
    }

    select option {
      background: var(--surface2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .section-label {
      font-size: .74rem;
      font-weight: 800;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: .08em;
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .checks {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .check-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .check-item:hover {
      border-color: rgba(244, 164, 53, .35);
      background: rgba(244, 164, 53, .05);
    }

    .check-item:active {
      background: rgba(244, 164, 53, .08);
    }

    .check-item input[type=checkbox] {
      width: 18px;
      height: 18px;
      accent-color: var(--gold);
      flex-shrink: 0;
      padding: 0;
      cursor: pointer;
    }

    .check-item label {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
      line-height: 1.35;
    }

    /* ─── PHOTO UPLOAD ───────────────────────── */
    .photos-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .photo-slot-label {
      font-size: .68rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 5px;
    }

    .photo-upload-area {
      border: 2px dashed var(--border2);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
      background: var(--surface2);
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-upload-area:hover {
      border-color: var(--gold);
      background: rgba(244, 164, 53, .04);
    }

    .photo-upload-area input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
      padding: 0;
      border: none;
      background: none;
    }

    .photo-upload-area input[type=file]:focus {
      box-shadow: none;
      border-color: transparent;
    }

    .photo-upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      pointer-events: none;
    }

    .photo-upload-placeholder .upload-icon {
      font-size: 1.5rem;
      line-height: 1;
    }

    .photo-upload-placeholder p {
      font-size: .72rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .photo-upload-placeholder p strong {
      color: var(--gold);
      display: block;
    }

    .photo-preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      width: 100%;
    }

    .photo-preview-wrap.visible {
      display: flex;
    }

    .photo-preview-wrap img {
      width: 72px;
      height: 72px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 4px rgba(244, 164, 53, .15);
      pointer-events: none;
    }

    .photo-preview-name {
      font-size: .67rem;
      color: var(--text-muted);
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events: none;
    }

    .photo-remove-btn {
      background: rgba(248, 113, 113, .12);
      border: 1px solid rgba(248, 113, 113, .25);
      color: var(--red);
      border-radius: 6px;
      padding: 3px 9px;
      font-size: .68rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      z-index: 2;
    }

    .photo-remove-btn:hover { background: rgba(248,113,113,.22); }

    @media (max-width: 600px) {
      .photos-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    }

    .detail-photos-wrap {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 14px 0 4px;
    }

    .detail-photo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .detail-photo-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 4px rgba(244, 164, 53, .15);
    }

    .detail-photo-item span {
      font-size: .67rem;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(96, 165, 250, .1);
      color: var(--blue);
      border: 1px solid rgba(96, 165, 250, .25);
      padding: 7px 14px;
      border-radius: 9px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: .78rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-download:hover { background: rgba(96, 165, 250, .2); }

    /* ─── DETAIL GRID ─── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .detail-field.full {
      grid-column: 1 / -1;
    }

    .detail-label {
      font-size: .72rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .detail-val {
      font-size: .88rem;
      color: var(--text);
      background: var(--surface2);
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      line-height: 1.5;
      min-height: 38px;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 0;
    }

    /* ─── TOAST ──────────────────────────────── */
    #toasts {
      position: fixed;
      bottom: 90px;
      right: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .82rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 9px;
      box-shadow: var(--shadow);
      animation: toastIn .3s ease;
      max-width: 280px;
    }

    .toast.success {
      border-color: var(--green);
    }

    .toast.error {
      border-color: var(--red);
    }

    @keyframes toastIn {
      from {
        transform: translateX(100px);
        opacity: 0;
      }

      to {
        transform: none;
        opacity: 1;
      }
    }

    /* ─── LOADING ─────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 0;
      color: var(--text-muted);
      font-size: .8rem;
      gap: 8px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── CONFIRM DIALOG ─────────────────────── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .confirm-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: 28px 20px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .confirm-box p {
      font-size: .93rem;
      color: var(--text);
      margin-bottom: 20px;
      line-height: 1.55;
    }

    .confirm-box strong {
      color: var(--red);
    }

    .confirm-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .confirm-btns button {
      flex: 1;
      justify-content: center;
    }

    /* ═══════════════════════════════════════════
       MOBILE — ≤ 600px
    ═══════════════════════════════════════════ */
    @media (max-width: 600px) {
      :root {
        --header-h: 54px;
      }

      header {
        padding: 0 14px;
      }

      .logo h1 {
        font-size: .92rem;
      }

      /* Hide stats badge on very small screens */
      .stats-badge {
        display: none;
      }

      /* Hide the header button on mobile — use FAB instead */
      .header-new-btn {
        display: none;
      }

      /* Show FAB */
      .fab {
        display: flex;
      }

      /* Toasts above FAB */
      #toasts {
        bottom: 88px;
        right: 12px;
      }

      /* Columns slightly narrower so next one peeks */
      .column {
        width: calc(100vw - 48px);
      }

      /* Modal: slide up from bottom, full width */
      .overlay {
        align-items: flex-end;
        padding: 0;
      }

      .modal {
        max-width: 100%;
        max-height: 95vh;
        border-radius: 20px 20px 0 0;
        transform: translateY(100%);
      }

      .overlay.active .modal {
        transform: translateY(0);
      }

      .modal-head {
        border-radius: 20px 20px 0 0;
        padding: 14px 16px 12px;
      }

      .modal-body {
        padding: 14px 16px;
      }

      .modal-foot {
        padding: 10px 16px 24px;
      }

      /* Stack form row on mobile */
      .form-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      /* Detail grid single column */
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .detail-field.full {
        grid-column: 1;
      }

      /* Card actions always visible on touch */
      .card-actions {
        opacity: 1;
      }

      /* Confirm box full-width */
      .confirm-btns {
        flex-direction: column;
      }

      .confirm-btns button {
        flex: unset;
        width: 100%;
      }
    }

    /* ═══════════════════════════════════════════
       TABLET — 601–900px
    ═══════════════════════════════════════════ */
    @media (min-width: 601px) and (max-width: 900px) {
      .column {
        width: 250px;
      }

      .stats-badge {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <h1>Central de <span>Mídias</span></h1>
    </div>
    <div class="header-right">
      <span class="stats-badge" id="total-badge">— cards</span>
      <button class="btn-primary header-new-btn" onclick="openNewModal()">＋ Nova Solicitação</button>
    </div>
  </header>

  <!-- ─── FLOATING ACTION BUTTON (mobile only) ─── -->
  <button class="fab" onclick="openNewModal()" aria-label="Nova Solicitação">＋</button>

  <!-- ─── BOARD ─── -->
  <div class="board" id="board"></div>

  <!-- ─── MODAL: NOVA SOLICITAÇÃO ─── -->
  <div class="overlay" id="newOverlay">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">✦ <span>Nova Solicitação</span></div>
        <button class="modal-x" onclick="closeNewModal()">✕</button>
      </div>
      <div class="modal-body">

        <div class="section-label">⬡ Dados do Evento</div>

        <div class="form-group">
          <label>Departamento Responsável <span class="req">*</span></label>
          <input type="text" id="f-dept" placeholder="Ex: Jovens, Louvor, EBD…" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Data do Evento <span class="req">*</span></label>
            <input type="date" id="f-data" />
          </div>
          <div class="form-group">
            <label>Horário</label>
            <input type="time" id="f-hora" />
          </div>
        </div>

        <div class="form-group">
          <label>Tema do Evento <span class="req">*</span></label>
          <input type="text" id="f-tema" placeholder="Ex: Culto de Oração, Conferência…" />
        </div>

        <div class="form-group">
          <label>Nome(s) do(s) Preletor(es)</label>
          <input type="text" id="f-preletor" placeholder="Ex: Pr. João Silva" />
        </div>

        <div class="form-group">
          <label>Fotos do Preletor <span style="color:var(--text-dim);font-weight:400;text-transform:none;letter-spacing:0">(opcional · máx. 5 MB cada)</span></label>
          <div class="photos-row">

            <!-- SLOT 1 -->
            <div>
              <div class="photo-slot-label">Foto 1</div>
              <div class="photo-upload-area" id="photo-area-1">
                <input type="file" id="f-foto-1" accept="image/*" onchange="handlePhotoSelect(event,1)" />
                <div class="photo-upload-placeholder" id="photo-placeholder-1">
                  <div class="upload-icon">🖼️</div>
                  <p><strong>Adicionar</strong>JPG, PNG, WEBP</p>
                </div>
                <div class="photo-preview-wrap" id="photo-preview-wrap-1">
                  <img id="photo-preview-img-1" src="" alt="Preview 1" />
                  <span class="photo-preview-name" id="photo-preview-name-1"></span>
                  <button type="button" class="photo-remove-btn" onclick="removePhoto(event,1)">✕ Remover</button>
                </div>
              </div>
            </div>

            <!-- SLOT 2 -->
            <div>
              <div class="photo-slot-label">Foto 2</div>
              <div class="photo-upload-area" id="photo-area-2">
                <input type="file" id="f-foto-2" accept="image/*" onchange="handlePhotoSelect(event,2)" />
                <div class="photo-upload-placeholder" id="photo-placeholder-2">
                  <div class="upload-icon">🖼️</div>
                  <p><strong>Adicionar</strong>JPG, PNG, WEBP</p>
                </div>
                <div class="photo-preview-wrap" id="photo-preview-wrap-2">
                  <img id="photo-preview-img-2" src="" alt="Preview 2" />
                  <span class="photo-preview-name" id="photo-preview-name-2"></span>
                  <button type="button" class="photo-remove-btn" onclick="removePhoto(event,2)">✕ Remover</button>
                </div>
              </div>
            </div>

          </div>
        </div>

        <div class="form-group">
          <label>Local do Evento</label>
          <input type="text" id="f-local" placeholder="Ex: Templo Principal, Salão…" />
        </div>

        <div class="section-label">⬡ Opções de Criativo</div>
        <div class="checks" id="checks-area">
          <div class="check-item">
            <input type="checkbox" id="m1" value="Banner Telão da Igreja" />
            <label for="m1">Banner Telão da Igreja</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="m2" value="Banner Instagram" />
            <label for="m2">Banner Instagram</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="m3" value="Banner WhatsApp" />
            <label for="m3">Banner WhatsApp</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="m4" value="Vídeo Telão" />
            <label for="m4">Vídeo de chamada p/ Telão (combinar com o pastor)</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="m5" value="Stories Instagram" />
            <label for="m5">Stories Instagram (a combinar)</label>
          </div>
          <div class="check-item">
            <input type="checkbox" id="m6" value="Reels Instagram" />
            <label for="m6">Reels Instagram (a combinar)</label>
          </div>
        </div>

        <div class="section-label">⬡ Observações</div>
        <div class="form-group">
          <label>Detalhes adicionais</label>
          <textarea id="f-obs"
            placeholder="Taxa do evento, materiais necessários, foto do ministro de fora etc. Se não houver, escreva: Não existe."></textarea>
        </div>

      </div>
      <div class="modal-foot">
        <button class="btn-secondary" onclick="closeNewModal()">Cancelar</button>
        <button class="btn-primary" id="submit-btn" onclick="submitCard()">Criar Solicitação</button>
      </div>
    </div>
  </div>

  <!-- ─── MODAL: DETALHES ─── -->
  <div class="overlay" id="detailOverlay">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title">✦ <span id="d-title">Detalhes</span></div>
        <button class="modal-x" onclick="closeDetailModal()">✕</button>
      </div>
      <div class="modal-body" id="d-body"></div>
      <div class="modal-foot">
        <button class="btn-danger" onclick="confirmDelete()">🗑 Excluir</button>
        <button class="btn-secondary" onclick="closeDetailModal()">Fechar</button>
      </div>
    </div>
  </div>

  <!-- ─── CONFIRM DIALOG ─── -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
      <p>Deseja realmente <strong>excluir</strong> este card?<br>Esta ação não pode ser desfeita.</p>
      <div class="confirm-btns">
        <button class="btn-secondary" onclick="closeConfirm()">Cancelar</button>
        <button class="btn-danger" onclick="doDelete()">Excluir</button>
      </div>
    </div>
  </div>

  <div id="toasts"></div>

  <script>
    /* ═══════════════════════════════════════════════
       CONFIG
    ═══════════════════════════════════════════════ */
    const SUPABASE_URL = 'https://fuilsqakfhzgadshopan.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_bhUX3iCEPheSGRs0rcYcDg_u7YEJAfC';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    const COLUMNS = [
      { id: 'solicitacoes', label: 'Solicitações', color: '#60a5fa' },
      { id: 'demanda_espera', label: 'Demanda em Espera', color: '#a78bfa' },
      { id: 'em_producao', label: 'Em Produção', color: '#fb923c' },
      { id: 'revisao', label: 'Revisão', color: '#f472b6' },
      { id: 'pronto', label: 'Pronto', color: '#34d399' },
      { id: 'avisos', label: 'Avisos', color: '#f4a435' },
      { id: 'arquivado', label: 'Arquivado', color: '#4a6080' },
    ];

    const TAG_STYLE = {
      'Banner Telão da Igreja': { bg: '#1a3460', fg: '#60a5fa' },
      'Banner Instagram': { bg: '#3a1a40', fg: '#e879f9' },
      'Banner WhatsApp': { bg: '#0f3020', fg: '#34d399' },
      'Vídeo Telão': { bg: '#3a2210', fg: '#fb923c' },
      'Stories Instagram': { bg: '#3a102a', fg: '#f472b6' },
      'Reels Instagram': { bg: '#2a0f20', fg: '#f87171' },
    };

    const TAG_SHORT = {
      'Banner Telão da Igreja': 'Telão',
      'Banner Instagram': 'IG',
      'Banner WhatsApp': 'WA',
      'Vídeo Telão': 'Vídeo',
      'Stories Instagram': 'Stories',
      'Reels Instagram': 'Reels',
    };

    let allCards = [];
    let sortables = [];
    let currentId = null;
    let selectedPhotos = { 1: null, 2: null };

    /* ═══════════════════════════════════════════════
       PHOTO UPLOAD HELPERS
    ═══════════════════════════════════════════════ */
    function handlePhotoSelect(e, slot) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) {
        toast(`Foto ${slot} muito grande. Máximo: 5 MB.`, 'error');
        e.target.value = '';
        return;
      }
      selectedPhotos[slot] = file;
      const reader = new FileReader();
      reader.onload = ev => {
        document.getElementById(`photo-preview-img-${slot}`).src = ev.target.result;
        document.getElementById(`photo-preview-name-${slot}`).textContent = file.name;
        document.getElementById(`photo-placeholder-${slot}`).style.display = 'none';
        document.getElementById(`photo-preview-wrap-${slot}`).classList.add('visible');
      };
      reader.readAsDataURL(file);
    }

    function removePhoto(e, slot) {
      e.stopPropagation();
      selectedPhotos[slot] = null;
      document.getElementById(`f-foto-${slot}`).value = '';
      document.getElementById(`photo-preview-img-${slot}`).src = '';
      document.getElementById(`photo-preview-name-${slot}`).textContent = '';
      document.getElementById(`photo-placeholder-${slot}`).style.display = '';
      document.getElementById(`photo-preview-wrap-${slot}`).classList.remove('visible');
    }

    function resetAllPhotos() {
      [1, 2].forEach(slot => {
        selectedPhotos[slot] = null;
        document.getElementById(`f-foto-${slot}`).value = '';
        document.getElementById(`photo-preview-img-${slot}`).src = '';
        document.getElementById(`photo-preview-name-${slot}`).textContent = '';
        document.getElementById(`photo-placeholder-${slot}`).style.display = '';
        document.getElementById(`photo-preview-wrap-${slot}`).classList.remove('visible');
      });
    }

    async function uploadPhoto(file) {
      const ext = file.name.split('.').pop();
      const path = `${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const { data, error } = await db.storage
        .from('fotos-preletores')
        .upload(path, file, { cacheControl: '3600', upsert: false });
      if (error) throw error;
      const { data: urlData } = db.storage.from('fotos-preletores').getPublicUrl(data.path);
      return urlData.publicUrl;
    }

    /* ═══════════════════════════════════════════════
       INIT
    ═══════════════════════════════════════════════ */
    async function init() {
      buildBoard();
      await loadCards();
      await checkAutoArquivar(); // ← Adicione esta linha aqui
      await checkAutoAvisos(); // ← regra: ≤14 dias → coluna Avisos
    }

    /* ═══════════════════════════════════════════════
       BUILD BOARD SKELETON
    ═══════════════════════════════════════════════ */
    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      COLUMNS.forEach(col => {
        const el = document.createElement('div');
        el.className = 'column';
        el.dataset.status = col.id;
        const pdfBtn = col.id === 'avisos'
          ? `<button class="btn-pdf" id="pdf-btn" onclick="gerarPdfAvisos()" title="Gerar PDF dos Avisos">📄 PDF</button>`
          : '';

        el.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <span class="col-dot" style="background:${col.color}"></span>${col.label}
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${pdfBtn}
          <span class="col-count" id="cnt-${col.id}">0</span>
        </div>
      </div>
      <div class="cards-wrap" id="col-${col.id}">
        <div class="loading"><div class="spinner"></div> Carregando…</div>
      </div>`;
        board.appendChild(el);
      });
    }

    /* ═══════════════════════════════════════════════
       LOAD CARDS FROM SUPABASE
    ═══════════════════════════════════════════════ */
    async function loadCards() {
      const { data, error } = await db
        .from('cards')
        .select('*')
        .order('posicao', { ascending: true })
        .order('created_at', { ascending: true });

      if (error) { toast('Erro ao carregar dados: ' + error.message, 'error'); return; }

      allCards = data || [];
      renderAll();
      initSortable();
      updateTotalBadge();
    }

    /* ═══════════════════════════════════════════════
       AUTO-AVISOS: move cards com ≤14 dias para Avisos
    ═══════════════════════════════════════════════ */
    async function checkAutoAvisos() {
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      const paraAvisar = allCards.filter(card => {
        if (!card.data_inicio || card.status === 'avisos' || card.status === 'arquivado') return false;

        const evento = new Date(card.data_inicio + 'T00:00:00');
        const diasRestantes = (evento - hoje) / (1000 * 60 * 60 * 24);

        // REGRA: Só vai para avisos se estiver entre o dia do evento (0) e 14 dias antes
        return diasRestantes <= 14 && diasRestantes >= 0;
      });

      if (!paraAvisar.length) return;

      for (const card of paraAvisar) {
        await db.from('cards').update({ status: 'avisos' }).eq('id', card.id);
        card.status = 'avisos';
      }
      renderAll();
    }

    /* ═══════════════════════════════════════════════
       RENDER ALL COLUMNS
    ═══════════════════════════════════════════════ */
    function renderAll() {
      const grouped = {};
      COLUMNS.forEach(c => { grouped[c.id] = []; });
      allCards.forEach(card => {
        const s = card.status || 'solicitacoes';
        if (grouped[s]) grouped[s].push(card);
      });

      COLUMNS.forEach(col => {
        const wrap = document.getElementById(`col-${col.id}`);
        const count = document.getElementById(`cnt-${col.id}`);
        const cards = grouped[col.id];
        wrap.innerHTML = '';
        count.textContent = cards.length;

        if (!cards.length) {
          wrap.innerHTML = '<div class="empty-col">Sem cards aqui</div>';
          return;
        }
        cards.forEach(card => wrap.appendChild(makeCardEl(card, col.color)));
      });
    }

    /* ═══════════════════════════════════════════════
       MAKE CARD ELEMENT
    ═══════════════════════════════════════════════ */
    function makeCardEl(card, accentColor) {
      const el = document.createElement('div');
      el.className = 'card';
      el.dataset.id = card.id;
      el.style.setProperty('--accent', accentColor || '#f4a435');

      const materiais = Array.isArray(card.materiais) ? card.materiais : [];
      const tagsHtml = materiais.slice(0, 4).map(m => {
        const s = TAG_STYLE[m] || { bg: '#1e2d40', fg: '#aaa' };
        return `<span class="tag" style="background:${s.bg};color:${s.fg}">${TAG_SHORT[m] || m}</span>`;
      }).join('');

      const dateStr = card.data_inicio ? fmtDate(card.data_inicio) : '—';
      const hora = card.horario ? ' · ' + card.horario.substring(0, 5) : '';

      el.innerHTML = `
    <div class="card-tema">${esc(card.tema || 'Sem tema')}</div>
    <div class="card-meta">🏛 ${esc(card.departamento || '—')}</div>
    <div class="card-meta">📅 ${dateStr}${hora}</div>
    ${card.preletor ? `<div class="card-meta">🎙 ${esc(card.preletor)}</div>` : ''}
    <div class="card-footer">
      <div class="card-tags">${tagsHtml}</div>
      <div class="card-actions">
        <button class="card-btn" title="Excluir" onclick="askDelete(event,'${card.id}')">🗑</button>
      </div>
    </div>`;

      el.addEventListener('click', e => {
        if (e.target.closest('.card-btn')) return;
        openDetail(card.id);
      });
      return el;
    }

    /* ═══════════════════════════════════════════════
       SORTABLE (drag & drop)
    ═══════════════════════════════════════════════ */
    function initSortable() {
      sortables.forEach(s => s.destroy());
      sortables = [];

      COLUMNS.forEach(col => {
        const wrap = document.getElementById(`col-${col.id}`);
        const inst = Sortable.create(wrap, {
          group: 'cards',
          animation: 200,
          ghostClass: 'sortable-ghost',
          chosenClass: 'sortable-chosen',
          filter: '.empty-col',
          delay: 150,
          delayOnTouchOnly: true,
          touchStartThreshold: 8,

          onEnd: async evt => {
            const id = evt.item.dataset.id;
            const newStatus = evt.to.closest('.column').dataset.status;

            // ✅ Remove "Sem cards aqui" da coluna de destino
            const emptyDest = evt.to.querySelector('.empty-col');
            if (emptyDest) emptyDest.remove();

            // ✅ Se a coluna de origem ficou vazia, recria placeholder
            const fromWrap = evt.from;
            if (!fromWrap.querySelector('.card')) {
              fromWrap.innerHTML = '<div class="empty-col">Sem cards aqui</div>';
            }

            // 🆕 Recalcula TODAS as posições da coluna de destino
            const toWrap = evt.to;
            const cardsInColumn = Array.from(toWrap.querySelectorAll('.card'));

            for (let i = 0; i < cardsInColumn.length; i++) {
              const cardId = cardsInColumn[i].dataset.id;

              // Atualiza no banco
              const { error } = await db
                .from('cards')
                .update({
                  status: newStatus,
                  posicao: i
                })
                .eq('id', cardId);

              if (error) {
                toast('Erro ao ordenar cards', 'error');
                return;
              }

              // Atualiza local
              const localCard = allCards.find(c => c.id === cardId);
              if (localCard) {
                localCard.status = newStatus;
                localCard.posicao = i;
              }
            }

            // Atualiza contadores
            updateCounts();

            toast('Card movido com sucesso!', 'success');
          }
        });

        sortables.push(inst);
      });
    }

    function updateCounts() {
      const cnt = {};
      COLUMNS.forEach(c => { cnt[c.id] = 0; });
      allCards.forEach(c => {
        const s = c.status || 'solicitacoes';
        if (cnt[s] !== undefined) cnt[s]++;
      });
      COLUMNS.forEach(c => {
        const el = document.getElementById(`cnt-${c.id}`);
        if (el) el.textContent = cnt[c.id];
      });
      updateTotalBadge();
    }

    function updateTotalBadge() {
      const active = allCards.filter(c => c.status !== 'arquivado').length;
      document.getElementById('total-badge').textContent =
        `${allCards.length} card${allCards.length !== 1 ? 's' : ''} · ${active} ativos`;
    }

    /* ═══════════════════════════════════════════════
       NEW CARD MODAL
    ═══════════════════════════════════════════════ */
    function openNewModal() {
      document.getElementById('newOverlay').classList.add('active');
      document.getElementById('f-dept').focus();
    }

    function closeNewModal() {
      document.getElementById('newOverlay').classList.remove('active');
      clearForm();
    }

    function clearForm() {
      ['f-dept', 'f-data', 'f-hora', 'f-tema', 'f-preletor', 'f-local', 'f-obs'].forEach(id => {
        document.getElementById(id).value = '';
      });
      ['m1', 'm2', 'm3', 'm4', 'm5', 'm6'].forEach(id => {
        document.getElementById(id).checked = false;
      });
      // Reset photos
      resetAllPhotos();

      document.getElementById('submit-btn').disabled = false;
      document.getElementById('submit-btn').textContent = 'Criar Solicitação';
    }

    async function submitCard() {
      const dept = document.getElementById('f-dept').value.trim();
      const tema = document.getElementById('f-tema').value.trim();
      const data = document.getElementById('f-data').value;

      if (!dept || !tema || !data) {
        toast('Preencha os campos obrigatórios (*)', 'error');
        return;
      }

      // 1. Lógica de cálculo exata
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);
      const evento = new Date(data + 'T00:00:00');
      const diasRestantes = (evento - hoje) / (1000 * 60 * 60 * 24);

      // 2. Define o status inicial com faixas bem definidas
      let statusInicial = 'solicitacoes';

      if (diasRestantes < 0) {
        // Caso a data seja de ontem ou anterior
        statusInicial = 'arquivado';
      } else if (diasRestantes <= 14) {
        // Caso a data seja entre HOJE e daqui a 14 dias
        statusInicial = 'avisos';
      }

      const checks = document.querySelectorAll('#checks-area input[type=checkbox]:checked');
      const materiais = Array.from(checks).map(c => c.value);

      // 3. Calcula a posição baseada na coluna de destino correta
      const posicao = allCards.filter(c => c.status === statusInicial).length;

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Criando…';

      // Upload das fotos do preletor (se houver)
      let fotoUrl = null, fotoUrl2 = null;
      const hasPhoto1 = !!selectedPhotos[1];
      const hasPhoto2 = !!selectedPhotos[2];

      if (hasPhoto1 || hasPhoto2) {
        btn.textContent = 'Enviando fotos…';
        try {
          if (hasPhoto1) fotoUrl  = await uploadPhoto(selectedPhotos[1]);
          if (hasPhoto2) fotoUrl2 = await uploadPhoto(selectedPhotos[2]);
        } catch (err) {
          toast('Erro ao enviar foto: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Criar Solicitação';
          return;
        }
      }

      const payload = {
        departamento: dept,
        tema,
        data_inicio: data,
        horario: document.getElementById('f-hora').value || null,
        preletor: document.getElementById('f-preletor').value.trim() || null,
        local: document.getElementById('f-local').value.trim() || null,
        observacoes: document.getElementById('f-obs').value.trim() || null,
        materiais: materiais.length ? materiais : null,
        foto_url: fotoUrl,
        foto_url_2: fotoUrl2,
        status: statusInicial, // Usa o status dinâmico calculado
        posicao,
      };

      const { data: newCard, error } = await db.from('cards').insert(payload).select().single();

      if (error) {
        toast('Erro ao criar: ' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Criar Solicitação';
        return;
      }

      allCards.push(newCard);

      // 4. Atualiza o DOM injetando o card na coluna certa dinamicamente
      const wrap = document.getElementById(`col-${statusInicial}`);
      const col = COLUMNS.find(c => c.id === statusInicial);
      const empty = wrap.querySelector('.empty-col');
      if (empty) wrap.innerHTML = ''; // Remove o texto "Sem cards aqui" se houver

      wrap.appendChild(makeCardEl(newCard, col.color));

      updateCounts();
      closeNewModal();

      // Feedback personalizado se foi direto para avisos
      if (statusInicial === 'avisos') {
        toast('Solicitação urgente criada direto em Avisos! ⚠️', 'success');
      } else {
        toast('Solicitação criada com sucesso! ✓', 'success');
      }
    }

    /* ═══════════════════════════════════════════════
       DETAIL MODAL
    ═══════════════════════════════════════════════ */
    function openDetail(id) {
      const card = allCards.find(c => c.id === id);
      if (!card) return;
      currentId = id;

      document.getElementById('d-title').textContent = card.tema || 'Detalhes';

      const materiais = Array.isArray(card.materiais) ? card.materiais : [];
      const tagsHtml = materiais.map(m => {
        const s = TAG_STYLE[m] || { bg: '#1e2d40', fg: '#aaa' };
        return `<span class="tag" style="background:${s.bg};color:${s.fg};font-size:.74rem;padding:4px 9px">${m}</span>`;
      }).join('');

      const statusOpts = COLUMNS.map(c =>
        `<option value="${c.id}" ${card.status === c.id ? 'selected' : ''}>${c.label}</option>`
      ).join('');

      document.getElementById('d-body').innerHTML = `
    ${(card.foto_url || card.foto_url_2) ? `
    <div class="detail-photos-wrap">
      ${card.foto_url ? `
      <div class="detail-photo-item">
        <img src="${esc(card.foto_url)}" alt="Foto 1" />
        <span>Foto 1</span>
        <a class="btn-download" href="${esc(card.foto_url)}" download target="_blank">⬇ Baixar</a>
      </div>` : ''}
      ${card.foto_url_2 ? `
      <div class="detail-photo-item">
        <img src="${esc(card.foto_url_2)}" alt="Foto 2" />
        <span>Foto 2</span>
        <a class="btn-download" href="${esc(card.foto_url_2)}" download target="_blank">⬇ Baixar</a>
      </div>` : ''}
    </div>` : ''}
    <div class="detail-grid">
      <div class="detail-field">
        <div class="detail-label">Departamento</div>
        <div class="detail-val">${esc(card.departamento || '—')}</div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Data do Evento</div>
        <div class="detail-val">${fmtDate(card.data_inicio)}</div>
      </div>
      <div class="detail-field full">
        <div class="detail-label">Tema</div>
        <div class="detail-val">${esc(card.tema || '—')}</div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Horário</div>
        <div class="detail-val">${card.horario ? card.horario.substring(0, 5) : '—'}</div>
      </div>
      <div class="detail-field">
        <div class="detail-label">Local</div>
        <div class="detail-val">${esc(card.local || '—')}</div>
      </div>
      <div class="detail-field full">
        <div class="detail-label">Preletor(es)</div>
        <div class="detail-val">${esc(card.preletor || '—')}</div>
      </div>
      ${materiais.length ? `
      <div class="detail-field full">
        <div class="detail-label">Materiais Solicitados</div>
        <div class="detail-tags">${tagsHtml}</div>
      </div>` : ''}
      <div class="detail-field full">
        <div class="detail-label">Observações</div>
        <div class="detail-val" style="white-space:pre-wrap">${esc(card.observacoes || '—')}</div>
      </div>
      <div class="detail-field full">
        <div class="detail-label">Mover para coluna</div>
        <select onchange="moveCard('${card.id}', this.value)">${statusOpts}</select>
      </div>
    </div>`;

      document.getElementById('detailOverlay').classList.add('active');
    }

    async function moveCard(id, newStatus) {
      const { error } = await db.from('cards').update({ status: newStatus }).eq('id', id);
      if (error) { toast('Erro ao mover: ' + error.message, 'error'); return; }

      const card = allCards.find(c => c.id === id);
      if (card) card.status = newStatus;

      renderAll();
      initSortable();
      updateTotalBadge();
      toast('Status atualizado!', 'success');
    }

    function closeDetailModal() {
      document.getElementById('detailOverlay').classList.remove('active');
      currentId = null;
    }

    /* ═══════════════════════════════════════════════
       DELETE
    ═══════════════════════════════════════════════ */
    function askDelete(e, id) {
      e.stopPropagation();
      currentId = id;
      openConfirm();
    }

    function confirmDelete() { openConfirm(); }

    function openConfirm() { document.getElementById('confirmOverlay').classList.add('active'); }
    function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); }

    async function doDelete() {
      if (!currentId) return;
      const { error } = await db.from('cards').delete().eq('id', currentId);
      closeConfirm();
      if (error) { toast('Erro ao excluir: ' + error.message, 'error'); return; }

      allCards = allCards.filter(c => c.id !== currentId);
      renderAll();
      initSortable();
      updateTotalBadge();
      closeDetailModal();
      toast('Card excluído.', 'success');
      currentId = null;
    }

    /* ═══════════════════════════════════════════════
   AUTO-ARQUIVAR: move cards com data passada para Arquivado
   ═══════════════════════════════════════════════ */
    async function checkAutoArquivar() {
      const hoje = new Date();
      hoje.setHours(0, 0, 0, 0);

      const paraArquivar = allCards.filter(card => {
        if (!card.data_inicio || card.status === 'arquivado') return false;

        const evento = new Date(card.data_inicio + 'T00:00:00');
        // REGRA: Se a data do evento é menor que HOJE (pelo menos 1 dia de atraso)
        return evento < hoje;
      });

      if (!paraArquivar.length) return;

      for (const card of paraArquivar) {
        await db.from('cards').update({ status: 'arquivado' }).eq('id', card.id);
        card.status = 'arquivado';
      }
      renderAll();
    }

    /* ═══════════════════════════════════════════════
       GERAR PDF — AVISOS
    ═══════════════════════════════════════════════ */
    async function gerarPdfAvisos() {
      const cards = allCards.filter(c => c.status === 'avisos');

      if (!cards.length) {
        toast('Nenhum card em Avisos para exportar.', 'error');
        return;
      }

      const btn = document.getElementById('pdf-btn');
      btn.disabled = true;
      btn.textContent = '⏳ Gerando…';

      try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

        const W = 210, margin = 18;
        const contentW = W - margin * 2;
        const gold   = [244, 164, 53];
        const dark   = [11,  22,  34];
        const white  = [220, 232, 245];
        const muted  = [110, 138, 168];
        const border = [23,  40,  64];

        // ── FUNDO ESCURO TOTAL ──
        doc.setFillColor(...dark);
        doc.rect(0, 0, 210, 297, 'F');

        // ── CABEÇALHO ──
        doc.setFillColor(...border);
        doc.roundedRect(margin, 12, contentW, 22, 4, 4, 'F');

        doc.setFont('helvetica', 'bold');
        doc.setFontSize(14);
        doc.setTextColor(...gold);
        doc.text('Central de Mídias', margin + 6, 21.5);

        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);
        doc.setTextColor(...muted);
        doc.text('Avisos — Eventos nos próximos 14 dias', margin + 6, 28);

        const today = new Date().toLocaleDateString('pt-BR');
        doc.text(`Gerado em: ${today}`, W - margin - 2, 28, { align: 'right' });

        // ── LINHA DOURADA ──
        doc.setDrawColor(...gold);
        doc.setLineWidth(0.4);
        doc.line(margin, 37, W - margin, 37);

        // ── CARDS ──
        let y = 42;
        const cardH = 52;
        const gap   = 5;

        cards.forEach((card, i) => {
          // Nova página se não couber
          if (y + cardH > 282) {
            doc.addPage();
            doc.setFillColor(...dark);
            doc.rect(0, 0, 210, 297, 'F');
            y = 14;
          }

          // Card bg
          doc.setFillColor(...border);
          doc.roundedRect(margin, y, contentW, cardH, 3, 3, 'F');

          // Borda esquerda dourada
          doc.setFillColor(...gold);
          doc.roundedRect(margin, y, 3, cardH, 1.5, 1.5, 'F');

          // Número do card
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(7);
          doc.setTextColor(...muted);
          doc.text(`#${String(i + 1).padStart(2, '0')}`, margin + 8, y + 6.5);

          // Tema
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(11);
          doc.setTextColor(...white);
          const tema = card.tema || 'Sem tema';
          const temaLines = doc.splitTextToSize(tema, contentW - 30);
          doc.text(temaLines[0], margin + 8, y + 14);

          // Linha divisória interna
          doc.setDrawColor(...border);
          doc.setDrawColor(40, 65, 96);
          doc.setLineWidth(0.2);
          doc.line(margin + 6, y + 18, W - margin - 4, y + 18);

          // Campos
          const fields = [
            { icon: '📅', label: 'Data',     value: fmtDate(card.data_inicio) },
            { icon: '🕐', label: 'Horário',  value: card.horario ? card.horario.substring(0, 5) : '—' },
            { icon: '🎙', label: 'Preletor', value: card.preletor || '—' },
            { icon: '📍', label: 'Local',    value: card.local    || '—' },
          ];

          const colW = contentW / 2 - 4;
          fields.forEach((f, fi) => {
            const col = fi % 2;
            const row = Math.floor(fi / 2);
            const fx = margin + 8 + col * (colW + 8);
            const fy = y + 25 + row * 11;

            doc.setFont('helvetica', 'bold');
            doc.setFontSize(6.5);
            doc.setTextColor(...muted);
            doc.text(f.label.toUpperCase(), fx, fy);

            doc.setFont('helvetica', 'normal');
            doc.setFontSize(8.5);
            doc.setTextColor(...white);
            const val = doc.splitTextToSize(f.value, colW - 4);
            doc.text(val[0], fx, fy + 5);
          });

          y += cardH + gap;
        });

        // ── RODAPÉ ──
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(...muted);
        doc.text(
          `Central de Mídias · ${cards.length} aviso${cards.length !== 1 ? 's' : ''}`,
          W / 2, 291, { align: 'center' }
        );

        doc.save(`avisos-${today.replace(/\//g, '-')}.pdf`);
        toast('PDF gerado com sucesso! ✓', 'success');

      } catch (err) {
        toast('Erro ao gerar PDF: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '📄 PDF';
      }
    }

    /* ═══════════════════════════════════════════════
       UTILITIES
    ═══════════════════════════════════════════════ */
    function fmtDate(d) {
      if (!d) return '—';
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function esc(str) {
      if (!str) return str;
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function toast(msg, type = 'success') {
      const c = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span> ${msg}`;
      c.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    /* ─── Close on overlay click ─── */
    ['newOverlay', 'detailOverlay'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target === e.currentTarget) {
          if (id === 'newOverlay') closeNewModal();
          else closeDetailModal();
        }
      });
    });
    document.getElementById('confirmOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeConfirm();
    });

    /* ─── Keyboard shortcuts ─── */
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        closeConfirm();
        closeDetailModal();
        closeNewModal();
      }
    });

    /* ─── BOOT ─── */
    init();
  </script>
</body>

</html>

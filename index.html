<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Criativos - Igreja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        igreja: { blue: '#0047AB', black: '#111111', gray: '#F3F4F6' }
                    }
                }
            }
        }
    </script>
    <style>
        .kanban-column {
            min-height: 600px;
            transition: background-color 0.2s;
        }

        .card-placeholder {
            background: rgba(0, 71, 171, 0.05);
            border: 2px dashed #0047AB;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 5px;
            height: 8px;
        }

        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Estilos vitais para o Drag Scroll funcionar */
        #kanban-container {
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            cursor: grab;
            user-select: none;
            /* Impede seleção de texto ao arrastar */
            -webkit-user-select: none;
            scroll-behavior: auto;
            /* Evita que o navegador tente arrastar o container como imagem */
            -webkit-user-drag: none;
        }

        #kanban-container:active {
            cursor: grabbing;
        }

        /* Impede que os elementos internos interfiram no clique do drag */
        .flex-shrink-0,
        h3,
        span {
            pointer-events: none;
        }

        /* Mas permite que a coluna e os cards recebam eventos (para o Sortable e Scroll) */
        .kanban-column,
        .kanban-column *,
        button,
        input,
        textarea {
            pointer-events: auto;
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans antialiased text-igreja-black overflow-hidden">

    <nav class="bg-white border-b p-4 sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1600px] mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-igreja-blue rounded-xl flex items-center justify-center text-white">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <h1 class="text-xl font-black text-igreja-blue tracking-tight">MÍDIA HUB</h1>
            </div>
            <button onclick="abrirModal()"
                class="bg-igreja-blue text-white px-6 py-2.5 rounded-full font-bold hover:bg-blue-800 transition-all shadow-lg active:scale-95">
                <i class="fa-solid fa-plus mr-2"></i>Nova Solicitação
            </button>
        </div>
    </nav>

    <main class="p-6 overflow-hidden">
        <div id="kanban-container" class="flex gap-6 pb-6 custom-scroll items-start"
            style="min-height: calc(100vh - 120px);">
        </div>
    </main>

    <div id="modalForm"
        class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-xl max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="fecharModal()"
                class="absolute top-6 right-6 text-gray-400 hover:text-black text-2xl">&times;</button>
            <form id="mediaForm" class="space-y-5" onsubmit="salvarNoSupabase(event)">
                <h2 class="text-2xl font-black mb-6">Novo Cartão</h2>
                <input type="text" id="departamento" required
                    class="w-full rounded-xl bg-gray-50 p-3 outline-none focus:ring-2 focus:ring-igreja-blue"
                    placeholder="Departamento">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="dataInicio" required class="w-full rounded-xl bg-gray-50 p-3 outline-none">
                    <input type="time" id="horario" required class="w-full rounded-xl bg-gray-50 p-3 outline-none">
                </div>
                <input type="text" id="tema" required class="w-full rounded-xl bg-gray-50 p-3 outline-none"
                    placeholder="Tema">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="preletor" class="w-full rounded-xl bg-gray-50 p-3 outline-none"
                        placeholder="Preletor">
                    <input type="text" id="local" class="w-full rounded-xl bg-gray-50 p-3 outline-none"
                        placeholder="Local">
                </div>
                <div class="bg-gray-50 p-4 rounded-xl">
                    <div class="grid grid-cols-2 gap-2">
                        <label><input type="checkbox" name="arte" value="Feed"> Feed</label>
                        <label><input type="checkbox" name="arte" value="Stories"> Stories</label>
                        <label><input type="checkbox" name="arte" value="Telão"> Telão</label>
                        <label><input type="checkbox" name="arte" value="Vídeo"> Vídeo</label>
                    </div>
                </div>
                <textarea id="observacoes" class="w-full rounded-xl bg-gray-50 p-3 outline-none"
                    placeholder="Observações"></textarea>
                <button type="submit" id="btnSalvar"
                    class="w-full bg-igreja-blue text-white font-bold py-4 rounded-2xl hover:bg-blue-800">Criar
                    Cartão</button>
            </form>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://fuilsqakfhzgadshopan.supabase.co', 'sb_publishable_bhUX3iCEPheSGRs0rcYcDg_u7YEJAfC');

        const colunas = [
            { id: 'solicitacoes', nome: '📥 Solicitações' },
            { id: 'analise', nome: '🔎 Alinhamento' },
            { id: 'producao', nome: '🎨 Produção' },
            { id: 'revisao', nome: '👀 Revisão' },
            { id: 'pronto', nome: '✅ Pronto' },
            { id: 'programado', nome: '📢 Programado' },
            { id: 'arquivado', nome: '🗂️ Arquivado' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderizarColunas();
            carregarCards();
            ativarRealtime();
            initDragScroll();
        });

        // --- FUNÇÃO DE ARRASTAR MELHORADA ---
        function initDragScroll() {
            const slider = document.getElementById('kanban-container');
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                // Se clicar em um card ou botão, não inicia o scroll da tela
                if (e.target.closest('.bg-white.p-5') || e.target.closest('button')) return;

                isDown = true;
                slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });

            slider.addEventListener('mouseleave', () => { isDown = false; });
            slider.addEventListener('mouseup', () => { isDown = false; });

            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2.5; // Aumentei a velocidade para 2.5
                slider.scrollLeft = scrollLeft - walk;
            });
        }

        function renderizarColunas() {
            const container = document.getElementById('kanban-container');
            container.innerHTML = '';

            colunas.forEach(col => {
                const colDiv = document.createElement('div');
                colDiv.className = "flex-shrink-0 w-80 flex flex-col";
                colDiv.innerHTML = `
                    <div class="flex items-center justify-between mb-4 px-1 header-col">
                        <h3 class="font-black text-gray-400 uppercase text-[11px] tracking-widest">${col.nome}</h3>
                        <span id="badge-${col.id}" class="bg-gray-200 text-gray-500 text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                    </div>
                    <div id="col-${col.id}" data-status="${col.id}" class="kanban-column custom-scroll overflow-y-auto max-h-[70vh]"></div>
                `;
                container.appendChild(colDiv);

                new Sortable(document.getElementById(`col-${col.id}`), {
                    group: 'kanban',
                    animation: 200,
                    ghostClass: 'card-placeholder',
                    scroll: true,
                    scrollSensitivity: 100,
                    scrollSpeed: 20,
                    bubbleScroll: true,
                    onEnd: async (evt) => {
                        const cardId = evt.item.dataset.id;
                        const novoStatus = evt.to.dataset.status;
                        await atualizarStatusCard(cardId, novoStatus);
                    }
                });
            });
        }

        async function carregarCards() {
            const { data: cards, error } = await _supabase.from('cards').select('*').order('created_at', { ascending: false });
            if (error) return;
            document.querySelectorAll('.kanban-column').forEach(el => el.innerHTML = '');
            cards.forEach(card => {
                const cardEl = criarElementoCard(card);
                const coluna = document.getElementById(`col-${card.status}`);
                if (coluna) coluna.appendChild(cardEl);
            });
            atualizarContadores();
        }

        function criarElementoCard(card) {
            const div = document.createElement('div');
            div.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-4 cursor-grab active:cursor-grabbing hover:shadow-md transition-all group relative';
            div.dataset.id = card.id;
            const dataFmt = card.data_inicio ? new Date(card.data_inicio + 'T00:00:00').toLocaleDateString('pt-BR') : '--/--/--';
            const materiaisHtml = (card.materiais || []).map(m => `<span class="bg-blue-50 text-blue-600 text-[9px] px-2 py-0.5 rounded-md font-bold uppercase tracking-tighter">${m}</span>`).join(' ');
            div.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[9px] font-black text-white bg-igreja-blue px-2 py-0.5 rounded-full uppercase">${card.departamento || 'Geral'}</span>
                    <button onclick="removerCard('${card.id}')" class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all"><i class="fa-solid fa-trash-can text-xs"></i></button>
                </div>
                <h4 class="font-bold text-sm text-gray-800 leading-tight mb-2">${card.tema}</h4>
                <div class="flex items-center gap-3 text-[10px] text-gray-400 mb-4">
                    <span><i class="fa-regular fa-calendar mr-1"></i> ${dataFmt}</span>
                    <span><i class="fa-regular fa-clock mr-1"></i> ${card.horario ? card.horario.substring(0, 5) : '--:--'}</span>
                </div>
                <div class="flex flex-wrap gap-1.5">${materiaisHtml}</div>
            `;
            return div;
        }

        async function salvarNoSupabase(e) {
            e.preventDefault();
            const materiais = Array.from(document.querySelectorAll('input[name="arte"]:checked')).map(cb => cb.value);
            const { error } = await _supabase.from('cards').insert([{
                departamento: document.getElementById('departamento').value,
                data_inicio: document.getElementById('dataInicio').value,
                horario: document.getElementById('horario').value,
                tema: document.getElementById('tema').value,
                preletor: document.getElementById('preletor').value,
                local: document.getElementById('local').value,
                observacoes: document.getElementById('observacoes').value,
                materiais: materiais,
                status: 'solicitacoes'
            }]);
            if (!error) { fecharModal(); document.getElementById('mediaForm').reset(); carregarCards(); }
        }

        async function atualizarStatusCard(id, novoStatus) {
            await _supabase.from('cards').update({ status: novoStatus }).eq('id', id);
            atualizarContadores();
        }

        async function removerCard(id) {
            if (confirm("Apagar cartão?")) { await _supabase.from('cards').delete().eq('id', id); carregarCards(); }
        }

        function atualizarContadores() {
            colunas.forEach(col => {
                const el = document.getElementById(`col-${col.id}`);
                if (el) document.getElementById(`badge-${col.id}`).textContent = el.children.length;
            });
        }

        function ativarRealtime() {
            _supabase.channel('schema-db-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'cards' }, () => carregarCards()).subscribe();
        }

        function abrirModal() { document.getElementById('modalForm').classList.remove('hidden'); }
        function fecharModal() { document.getElementById('modalForm').classList.add('hidden'); }
    </script>
</body>

</html>
